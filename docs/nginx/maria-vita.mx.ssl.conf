# Nginx site config for Maria Vita with SSL
# Copy to: /etc/nginx/sites-available/maria-vita.mx
# Then enable in /etc/nginx/sites-enabled/

# HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name maria-vita.mx www.maria-vita.mx;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name maria-vita.mx www.maria-vita.mx;

    ssl_certificate /etc/letsencrypt/live/maria-vita.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maria-vita.mx/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
