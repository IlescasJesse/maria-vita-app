<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="32" height="32">
  <!-- Fondo con color de marca y esquinas redondeadas -->
  <rect width="100" height="100" rx="20" fill="#37426f"/>

  <!-- Silueta de la Virgen: velo en arco + manto que fluye -->
  <path d="M50 11
    C46 11, 37 15, 35 24
    C33 31, 35 37, 38 41
    C32 45, 26 54, 25 65
    C24 74, 26 83, 29 90
    L71 90
    C74 83, 76 74, 75 65
    C74 54, 68 45, 62 41
    C65 37, 67 31, 65 24
    C63 15, 54 11, 50 11 Z"
    fill="white"/>

  <!-- Halo dorado alrededor de la cabeza -->
  <circle cx="50" cy="30" r="16" fill="none" stroke="#c9a227" stroke-width="3.5"/>

  <!-- Óvalo del rostro (color de fondo, crea contraste con el velo blanco) -->
  <ellipse cx="50" cy="31" rx="9" ry="10.5" fill="#37426f"/>
</svg>
